<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pouchlite| pure javascript json and files storage engine</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="./docsify.css"> 
  <link rel="stylesheet" href="./app.css"> 
  <script src="https://{{cdn}}/prismjs@v1.x/components/prism-core.min.js"></script>
	<script src="https://{{cdn}}/prismjs@v1.x/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="cdn.jsdelivr.net/npm/docsify/lib/plugins/ga.min.js"></script>
  <script src="cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
</head>
<body><!DOCTYPE html>

  <nav>
    <a href="/home">
       <img src="./_media/plogo.svg" class="plogo" alt="pouchlite" />
    </a>
    <a href="/suport">suport</a>
  </nav>
  <div id="app">ap</div>
  <script>
    window.$docsify = {
      name: 'pouchlite',
      repo: 'https://github.com/pouchlabs/pouchlite/',
      loadNavbar: true,
      routerMode: 'history',
      ext: '.html',  
      homepage: 'home.html',
      loadSidebar: '_sidebar.html',
      relativePath: true,
      mergeNavbar: true,
    }
  </script>
  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('sw.js')
    }
    window.addEventListener('DOMContentLoaded',()=>{
   
   let links = document.querySelectorAll('.pnavlinks');

links.forEach(el=>{
   el.addEventListener('click',()=>{
       if(el.classList.contains('active')){
           el.classList.remove('active')
           return
         }
         el.classList.add('active')
   })
 
})

})
  </script> 
  <!-- Docsify v4 -->

  <script src="/docsify.min.js"></script> 
 
</body>
</html>
